<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Signal Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0b0e11; color: white; font-family: sans-serif; }
        .card { background: #1e2329; border: 1px solid #2b3139; border-radius: 12px; transition: 0.3s; cursor: pointer; }
        .active { border: 2px solid #f0b90b !important; }
        .LONG { color: #2ebd85; } .SHORT { color: #f6465d; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-black text-yellow-500">PRO SIGNAL SYSTEM</h1>
            <div id="status" class="text-[10px] px-2 py-1 rounded bg-red-500/20 text-red-500">ĐANG CHỜ API...</div>
        </div>

        <div id="chart-box" class="w-full h-[400px] bg-[#161a1e] rounded-xl border border-slate-800 mb-6 overflow-hidden relative">
            <div class="absolute top-4 left-4 z-10 bg-black/50 p-2 rounded text-sm font-bold">
                <span id="curSym">BTC/USDT</span>: <span id="curPrice" class="text-yellow-400">---</span>
            </div>
            <div id="mainChart" class="w-full h-full"></div>
        </div>

        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </div>

    <script>
        const API_URL = "https://myminiapp-oawx.onrender.com";
        let chart, candleSeries, currentSymbol = "BTC/USDT";

        function initChart() {
            const container = document.getElementById('mainChart');
            chart = LightweightCharts.createChart(container, {
                layout: { background: { color: '#161a1e' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#2b3139' }, horzLines: { color: '#2b3139' } },
            });
            candleSeries = chart.addCandlestickSeries({ upColor: '#2ebd85', downColor: '#f6465d' });
        }

        async function loadChart(symbol) {
            currentSymbol = symbol;
            document.getElementById('curSym').innerText = symbol === 'PAXG/USDT' ? 'GOLD (Vàng)' : symbol;
            try {
                const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol.replace('/', '')}&interval=1h&limit=100`);
                const data = await res.json();
                const ohlc = data.map(d => ({ time: d[0]/1000, open: d[1], high: d[2], low: d[3], close: d[4] }));
                candleSeries.setData(ohlc);
                chart.timeScale().fitContent();
            } catch (e) {}
        }

        async function fetchData() {
            try {
                const res = await fetch(`${API_URL}/api/signals`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                
                data.forEach(item => {
                    if (item.symbol === currentSymbol) {
                        document.getElementById('curPrice').innerText = item.price;
                    }
                    const div = document.createElement('div');
                    div.className = `card p-4 ${item.signal} ${item.symbol === currentSymbol ? 'active' : ''}`;
                    div.onclick = () => loadChart(item.symbol);
                    div.innerHTML = `
                        <div class="font-bold text-xs">${item.symbol}</div>
                        <div class="text-xl font-mono my-1">${item.price}</div>
                        <div class="text-[10px] font-black uppercase">${item.signal} (RSI: ${item.rsi})</div>
                    `;
                    grid.appendChild(div);
                });

                document.getElementById('status').innerText = "HỆ THỐNG ONLINE ✅";
                document.getElementById('status').className = "text-[10px] px-2 py-1 rounded bg-green-500/20 text-green-500";
            } catch (e) {
                document.getElementById('status').innerText = "ĐANG THỬ LẠI KẾT NỐI...";
            }
        }

        initChart();
        loadChart("BTC/USDT");
        setInterval(fetchData, 5000); // Cập nhật mỗi 5 giây
        fetchData();
    </script>
</body>
</html>
