<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Signal Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0b0e11; color: white; }
        #chart { height: 450px; background: #161a1e; border-radius: 12px; border: 1px solid #2b3139; }
        .card { background: #1e2329; border: 1px solid #2b3139; border-radius: 8px; cursor: pointer; }
        .LONG { color: #2ebd85; border-bottom: 3px solid #2ebd85; }
        .SHORT { color: #f6465d; border-bottom: 3px solid #f6465d; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between mb-4">
            <h1 class="text-2xl font-bold text-yellow-500 italic underline">1 TRADING SIGNAL LIVE 4</h1>
            <div id="status" class="text-xs text-red-500 italic">Đang chờ API...</div>
        </div>

        <div id="chart" class="mb-6"></div>
        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </div>

    <script>
        const API = "https://myminiapp-oawx.onrender.com";
        let chart, candleSeries, curSym = "BTC/USDT";

        function init() {
            chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: { background: { color: '#161a1e' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#2b3139' }, horzLines: { color: '#2b3139' } },
            });
            candleSeries = chart.addCandlestickSeries({ upColor: '#2ebd85', downColor: '#f6465d' });
        }

        async function update(symbol) {
            curSym = symbol;
            try {
                // Load nến từ Binance
                const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol.replace('/', '')}&interval=1h&limit=100`);
                const data = await res.json();
                const ohlc = data.map(d => ({ time: d[0]/1000, open: d[1], high: d[2], low: d[3], close: d[4] }));
                candleSeries.setData(ohlc);

                // Load tín hiệu từ Bot của bạn
                const sigRes = await fetch(`${API}/api/signals`);
                const signals = await sigRes.json();
                const mySig = signals.find(s => s.symbol === symbol);

                if (mySig && mySig.signal !== "WAIT") {
                    candleSeries.setMarkers([{
                        time: ohlc[ohlc.length-1].time,
                        position: mySig.signal === 'LONG' ? 'belowBar' : 'aboveBar',
                        color: mySig.signal === 'LONG' ? '#2ebd85' : '#f6465d',
                        shape: mySig.signal === 'LONG' ? 'arrowUp' : 'arrowDown',
                        text: mySig.signal + ' 🔥'
                    }]);
                } else { candleSeries.setMarkers([]); }
                chart.timeScale().fitContent();
            } catch (e) { document.getElementById('status').innerText = "API chưa online, hãy đợi 30s..."; }
        }

        async function loadGrid() {
            try {
                const res = await fetch(`${API}/api/signals`);
                const data = await res.json();
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = `card p-4 ${item.signal}`;
                    div.onclick = () => update(item.symbol);
                    div.innerHTML = `<div class="font-bold text-sm">${item.symbol}</div><div class="text-xl">${item.price}</div><div class="text-[10px] font-black">${item.signal} (RSI: ${item.rsi})</div>`;
                    grid.appendChild(div);
                });
                document.getElementById('status').innerText = "LIVE ✅";
                document.getElementById('status').className = "text-xs text-green-500 italic";
            } catch (e) {}
        }

        init();
        update("BTC/USDT");
        setInterval(loadGrid, 10000);
        loadGrid();
    </script>
</body>
</html>
