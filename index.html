<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Pro Mini App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .card-signal { background: #1e293b; border: 1px solid #334155; transition: 0.3s; cursor: pointer; }
        .card-signal:active { transform: scale(0.98); }
        .LONG { color: #22c55e; font-weight: bold; }
        .SHORT { color: #ef4444; font-weight: bold; }
        .WAIT { color: #94a3b8; }
    </style>
</head>
<body class="p-4">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-bold text-blue-400">📊 SIGNAL PRO</h1>
        <div id="status" class="text-[10px] bg-slate-800 px-2 py-1 rounded">Đang quét...</div>
    </div>

    <div id="chart-container" class="w-full h-64 rounded-xl overflow-hidden mb-4 border border-slate-700"></div>

    <div id="signal-list" class="space-y-3">
        </div>

    <script>
        // Đã chèn link Render của bạn vào đây
        const RENDER_LINK = "https://myminiapp-oawx.onrender.com"; 
        
        function loadChart(symbol) {
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:" + symbol.replace('/', ''),
                "interval": "60",
                "theme": "dark",
                "style": "1",
                "locale": "vi",
                "container_id": "chart-container",
                "hide_top_toolbar": true,
                "allow_symbol_change": false
            });
        }

        async function fetchSignals() {
            try {
                const res = await fetch(`${RENDER_LINK}/api/signals`);
                const data = await res.json();
                const list = document.getElementById('signal-list');
                list.innerHTML = '';

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card-signal p-4 rounded-xl flex justify-between items-center';
                    card.onclick = () => loadChart(item.symbol);
                    
                    card.innerHTML = `
                        <div>
                            <div class="font-bold text-lg">${item.symbol}</div>
                            <div class="text-xs text-slate-400">Giá: ${item.price}</div>
                        </div>
                        <div class="text-right">
                            <div class="${item.signal} text-xl">${item.signal}</div>
                            <div class="text-[10px] text-slate-500 font-mono">RSI: ${item.rsi}</div>
                        </div>
                    `;
                    list.appendChild(card);
                });
                document.getElementById('status').innerText = "Cập nhật: " + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('status').innerText = "Lỗi kết nối Backend!";
            }
        }

        // Chạy mặc định
        loadChart("BTC/USDT");
        fetchSignals();
        setInterval(fetchSignals, 20000); // Tự động làm mới mỗi 20 giây
    </script>
</body>
</html>
